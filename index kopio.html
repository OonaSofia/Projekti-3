<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <title>Todo -lista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
 <main class="container py-4">
      <h1>Todo-lista</h1>

      <form id="todoFormi" onsubmit="validateForm(event)">
        <label for="task" class="form-label fs-5 fw-semibold">Mitä minun pitää tehdä</label>
        <input id="task" type="text" placeholder="Kirjoita tehtävä" />
        <div id="errorviesti"></div>

        <button type="submit" class="btn btn-success" >Lisää</button>
      </form>

      <ul id="list"></ul>

    </main>
    <script src="script.js"></script>
  </body>
</html>
